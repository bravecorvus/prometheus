<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prometheus Clock</title>
    <link rel="shortcut icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" type="text/css" href="/css/styles.css">
    <script type="text/javascript" src="nixie/nixie.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>

<div id="app">

    <nav>
        <a href="#" :class="{ active: active === 'home' }" @click.prevent="active = 'home'">Home</a>
        <a href="#" :class="{ active: active === 'settings' }" @click.prevent="active = 'settings'">Settings</a>
        <a href="#" :class="{ active: active === 'about' }" @click.prevent="active = 'about'">About</a>
    </nav>

    <div class="header">
        <p id="atomicclock">Prometheus Clock</p>
        <form ref="snoozeform" id="snoozeform" action="/snooze" method="post">
            <input id="snooze" type="submit" name="snooze" value="Snooze">
        </form>
        <div class="nixie-wrap" @click="$refs.snoozeform.submit()">
            <div id="nd1"></div>
        </div>
    </div>

    <!-- Home: Alarms -->
    <div class="content" v-if="active === 'home'">
        <div class="alarm-grid">
            <div class="alarm-card" v-for="(alarm, i) in alarms" :key="alarm.name">
                <div class="alarm-label">Alarm {{ i + 1 }}</div>
                <div class="time-row">
                    <input v-model="alarm.time" class="time" type="time">
                    <button @click="submitTime(alarm)">Set</button>
                </div>
                <div class="toggle-row">
                    <label class="toggle-label">Sound</label>
                    <label class="switch">
                        <input type="checkbox" :checked="alarm.sound === 'on'" @click="toggleSound(alarm)">
                        <div class="slider"></div>
                    </label>
                </div>
                <div class="toggle-row">
                    <label class="toggle-label">Vibration</label>
                    <label class="switch">
                        <input type="checkbox" :checked="alarm.vibration === 'on'" @click="toggleVibration(alarm)">
                        <div class="slider"></div>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings -->
    <div class="content" v-else-if="active === 'settings'">
        <div class="settings-grid">

            <div class="settings-card">
                <h3>Alarm Audio</h3>
                <div id="drop-box" @click="$refs.fileInput.click()">
                    <p>Current Track: <strong>{{ trackinfo }}</strong></p>
                    <p style="margin-top: 8px;">Tap to change</p>
                </div>
                <input type="file" accept="audio/*" ref="fileInput" @change="fileUpload" style="display:none;">
            </div>

            <div class="settings-card">
                <h3>LED Settings</h3>
                <div class="setting-row">
                    <label class="toggle-label">Enable LED</label>
                    <label class="switch">
                        <input type="checkbox" :checked="enableled" @click="toggleEnableLed">
                        <div class="slider"></div>
                    </label>
                </div>
                <div v-show="enableled">
                    <h4>LED Color</h4>
                    <div class="color-row">
                        <input v-model="colors" type="color">
                        <button @click="submitColors">Apply</button>
                    </div>
                </div>
            </div>

            <div class="settings-card">
                <h3>IP Change Notifications</h3>
                <div class="setting-row">
                    <label class="toggle-label">Email on IP change</label>
                    <label class="switch">
                        <input type="checkbox" :checked="enableemail" @click="toggleEnableEmail">
                        <div class="slider"></div>
                    </label>
                </div>
                <div v-if="enableemail" class="email-row">
                    <input v-model="email" type="text" placeholder="you@example.com">
                    <button @click="submitEmail">Save</button>
                </div>
            </div>

            <div class="settings-card">
                <h3>Audio Output</h3>
                <div class="setting-row">
                    <label class="toggle-label">Custom Sound Card</label>
                    <label class="switch">
                        <input type="checkbox" :checked="customsoundcard" @click="toggleCustomSoundCard">
                        <div class="slider"></div>
                    </label>
                </div>
            </div>

        </div>
    </div>

    <!-- About -->
    <div class="content" v-else-if="active === 'about'" id="aboutcontent">
        <img src="img/home.jpg">
    </div>

    <div class="toast-stack">
        <div v-for="t in toasts" :key="t.id" class="toast" :class="'toast-' + t.kind">
            {{ t.message }}
        </div>
    </div>

</div>

<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            alarms: [],
            trackinfo: '',
            email: '',
            enableemail: false,
            customsoundcard: false,
            active: 'home',
            colors: '#000000',
            enableled: false,
            demo: false,
            toasts: [],
            toastSeq: 0,
            ws: null,
        };
    },

    methods: {
        postForm(url, data) {
            fetch(url, { method: 'POST', body: new URLSearchParams(data) });
        },

        submitTime(alarm) {
            this.postForm('/time', { name: alarm.name, value: alarm.time });
        },

        toggleSound(alarm) {
            alarm.sound = alarm.sound === 'on' ? 'off' : 'on';
            this.postForm('/sound', { name: alarm.name, value: alarm.sound });
        },

        toggleVibration(alarm) {
            alarm.vibration = alarm.vibration === 'on' ? 'off' : 'on';
            this.postForm('/vibration', { name: alarm.name, value: alarm.vibration });
        },

        toggleEnableEmail() {
            this.enableemail = !this.enableemail;
            this.postForm('/enableemail', { value: this.enableemail });
        },

        toggleCustomSoundCard() {
            this.customsoundcard = !this.customsoundcard;
            this.postForm('/customsoundcard', { value: this.customsoundcard });
        },

        submitEmail() {
            this.postForm('/newemail', { value: this.email });
        },

        toggleEnableLed() {
            this.enableled = !this.enableled;
            this.postForm('/submitenableled', { value: this.enableled });
        },

        submitColors() {
            this.postForm('/submitcolors', { value: this.colors });
        },

        showToast(message, kind) {
            const id = ++this.toastSeq;
            this.toasts.push({ id, message, kind: kind || 'info' });
            setTimeout(() => {
                this.toasts = this.toasts.filter(t => t.id !== id);
            }, 4000);
        },

        connectDemoWS() {
            const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = proto + '//' + window.location.host + '/ws';
            const ws = new WebSocket(url);
            ws.onmessage = (e) => {
                let data;
                try { data = JSON.parse(e.data); } catch (_) { return; }
                switch (data.event) {
                    case 'vibration_on':  this.showToast('Vibration started', 'warn'); break;
                    case 'vibration_off': this.showToast('Vibration stopped', 'info'); break;
                    case 'sound_start':   this.showToast('Sound playing', 'warn'); break;
                    case 'sound_stop':    this.showToast('Sound stopped', 'info'); break;
                }
            };
            ws.onclose = () => {
                this.ws = null;
                setTimeout(() => { if (this.demo) this.connectDemoWS(); }, 2000);
            };
            this.ws = ws;
        },

        fileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!file.type.match('audio.*')) {
                alert('Audio files only.');
                return;
            }
            const data = new FormData();
            data.append('audio', file, file.name);
            fetch('/upload', { method: 'POST', body: data })
                .then(r => { if (r.ok) this.trackinfo = file.name; });
        },
    },

    created() {
        fetch('/api/mode').then(r => r.json()).then(d => {
            this.demo = !!d.demo;
            if (this.demo) this.connectDemoWS();
        }).catch(() => {});
        fetch('/json/alarms.json').then(r => r.json()).then(d => { this.alarms = d; });
        fetch('/json/email').then(r => r.text()).then(d => { this.email = d.trim(); });
        fetch('/json/enableemail').then(r => r.text()).then(d => { this.enableemail = d.trim() === 'true'; });
        fetch('/json/trackinfo').then(r => r.text()).then(d => { this.trackinfo = d.trim(); });
        fetch('/json/colors').then(r => r.text()).then(d => { this.colors = d.trim(); });
        fetch('/json/customsoundcard').then(r => r.text()).then(d => { this.customsoundcard = d.trim() === 'true'; });
        fetch('/json/enableled').then(r => r.text()).then(d => { this.enableled = d.trim() === 'true'; });
    },

    mounted() {
        const nd = new NixieClock();
        nd.id = 'nd1';
        nd.urlCharsetImage = 'nixie/zm1080_l2_09bdm_90x150_8b.png';
        nd.charWidth = 90;
        nd.charHeight = 150;
        nd.extraGapsWidths[1] = 12;
        nd.extraGapsWidths[3] = 12;
        nd.charGapWidth = 10;
        const el = document.getElementById(nd.id);
        if (el && el.parentNode) {
            el.parentNode.style.background = 'black';
        }
        nd.init();
        nd.run();

        // Scale nixie to fit the screen width
        this.$nextTick(() => {
            const nixieEl = document.getElementById('nd1');
            const wrap = nixieEl ? nixieEl.parentElement : null;
            if (nixieEl && wrap) {
                const scaleNixie = () => {
                    nixieEl.style.transform = 'none';
                    wrap.style.height = '';
                    const nixieW = nixieEl.scrollWidth;
                    const availW = wrap.clientWidth;
                    if (nixieW > availW) {
                        const s = availW / nixieW;
                        nixieEl.style.transform = 'scale(' + s + ')';
                        wrap.style.height = (nixieEl.scrollHeight * s) + 'px';
                    }
                };
                scaleNixie();
                window.addEventListener('resize', scaleNixie);
            }
        });
    },
}).mount('#app');

window.addEventListener('scroll', () => {
    const nav = document.querySelector('nav');
    if (!nav) return;
    nav.classList.toggle('nav-up', window.scrollY > 50);
});
</script>

</body>
</html>
